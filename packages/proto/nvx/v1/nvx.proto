syntax = "proto3";

package nvx.v1;

option go_package = "github.com/nevarix/nevarix-v2/apps/hub/internal/pb;pb";

import "google/protobuf/timestamp.proto";

// --- Messages ---

message MetricBatch {
  string agent_name = 1;
  string server_identity = 2;
  google.protobuf.Timestamp recorded_at = 3;
  double cpu_percent = 4;
  optional double gpu_percent = 5;
  double ram_percent = 6;
  double storage_percent = 7;
  uint64 network_bytes_in = 8;
  uint64 network_bytes_out = 9;
  uint64 uptime_seconds = 10;
}

message ServerEvent {
  string event_id = 1;
  string agent_name = 2;
  string server_identity = 3;
  string event_type = 4;
  google.protobuf.Timestamp occurred_at = 5;
  string payload_json = 6;
}

message CommandRequest {
  string request_id = 1;
  string command_type = 2;
  string target_agent_name = 3;
  string payload_json = 4;
}

message CommandResponse {
  string request_id = 1;
  bool success = 2;
  string output = 3;
  string error_message = 4;
  google.protobuf.Timestamp completed_at = 5;
}

message ConnectionRequest {
  string request_id = 1;
  string requester_name = 2;
  string requester_type = 3;
  string target_name = 4;
  string target_type = 5;
  bytes certificate_pem = 6;
  google.protobuf.Timestamp requested_at = 7;
}

message ConnectionRequestAck {
  string request_id = 1;
  string status = 2;
}

message InventorySnapshot {
  string server_alias = 1;
  string cpu_model = 2;
  int32 cpu_cores = 3;
  uint64 ram_bytes = 4;
  string motherboard = 5;
  repeated StorageDevice storage = 6;
  repeated NetworkInterface nics = 7;
  bool is_vm = 8;
  string os_name = 9;
  string os_version = 10;
  uint64 uptime_seconds = 11;
}

message StorageDevice {
  string mount_point = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes = 3;
}

message NetworkInterface {
  string name = 1;
  string mac_address = 2;
  repeated string ipv4_addresses = 3;
}

message TerminalFrame {
  string session_id = 1;
  string agent_name = 2;
  bytes data = 3;
  bool close = 4;
}

message LogConfigUpdate {
  string log_root_dir = 1;
  int32 service_txt_limit_mb = 2;
  int32 errors_txt_limit_mb = 3;
  int32 connectivity_txt_limit_mb = 4;
}

// --- Streaming envelopes ---

message ManagerFrame {
  oneof payload {
    CommandRequest command_request = 1;
    ConnectionRequest connection_request = 2;
    LogConfigUpdate log_config_update = 3;
    TerminalFrame terminal_frame = 4;
  }
}

message HubFrame {
  oneof payload {
    MetricBatch metric_batch = 1;
    ServerEvent server_event = 2;
    CommandResponse command_response = 3;
    InventorySnapshot inventory_snapshot = 4;
    ConnectionRequestAck connection_request_ack = 5;
    TerminalFrame terminal_frame = 6;
  }
}

message AgentFrame {
  oneof payload {
    MetricBatch metric_batch = 1;
    ServerEvent server_event = 2;
    CommandResponse command_response = 3;
    InventorySnapshot inventory_snapshot = 4;
    ConnectionRequest connection_request = 5;
    TerminalFrame terminal_frame = 6;
  }
}

message HubAgentCommand {
  oneof payload {
    CommandRequest command_request = 1;
    LogConfigUpdate log_config_update = 2;
    TerminalFrame terminal_frame = 3;
  }
}

message AgentResponse {
  oneof payload {
    MetricBatch metric_batch = 1;
    ServerEvent server_event = 2;
    CommandResponse command_response = 3;
    InventorySnapshot inventory_snapshot = 4;
    TerminalFrame terminal_frame = 5;
  }
}

// --- Services ---

service NvxHubService {
  rpc ConnectManager(stream ManagerFrame) returns (stream HubFrame);
  rpc ConnectAgent(stream AgentFrame) returns (stream HubAgentCommand);
  rpc SubmitConnectionRequest(ConnectionRequest) returns (ConnectionRequestAck);
}

service NvxAgentService {
  rpc Connect(stream HubAgentCommand) returns (stream AgentResponse);
  rpc SubmitConnectionRequest(ConnectionRequest) returns (ConnectionRequestAck);
}
