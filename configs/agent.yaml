agent_name: "agent-1"
server_alias: "server-01"
grpc_listen: ":9444"
log_root_dir: "/var/log/nvx"
cache_dir: "/var/cache/nvx/outbound"
cache_max_mb: 512
metrics_interval_sec: 15
hub_endpoints:
  - "localhost:9443"
mdns_enabled: true
tls:
  cert_file: "/etc/nvx/certs/agent.crt"
  key_file: "/etc/nvx/certs/agent.key"
  ca_file: "/etc/nvx/certs/ca.crt"
